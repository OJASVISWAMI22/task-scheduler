version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: task_postgres
    environment:
      POSTGRES_USER: taskadmin
      POSTGRES_PASSWORD: taskpassword
      POSTGRES_DB: taskscheduler
    ports:
    - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskadmin -d taskscheduler"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: task_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cpp_service:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: task_cpp
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  fastapi:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: task_fastapi
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      cpp_service:
        condition: service_started

volumes:
  postgres_data:
  redis_data: